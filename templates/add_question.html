<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Question - AI Proctoring System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-graduation-cap"></i> AI Exam
            </div>
            <nav class="sidebar-nav">
                <a href="{{ url_for('admin_dashboard') }}" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
                <a href="{{ url_for('admin_alerts') }}" class="nav-link"><i class="fas fa-exclamation-triangle"></i> Alerts</a>
                <div class="nav-item-dropdown">
                    <a href="#" class="nav-link" onclick="document.getElementById('exams-dropdown').classList.toggle('show'); return false;">
                        <i class="fas fa-file-alt"></i> Exams <i class="fas fa-chevron-down" style="margin-left: auto;"></i>
                    </a>
                    <div id="exams-dropdown" class="dropdown-content show">
                        <a href="{{ url_for('create_exam') }}" class="nav-link"><i class="fas fa-plus-circle"></i> Create Exam</a>
                        <a href="{{ url_for('manage_exams') }}" class="nav-link active"><i class="fas fa-list"></i> Manage Exams</a>
                    </div>
                </div>
                <a href="#" class="nav-link"><i class="fas fa-users"></i> Users & Students</a>
                <a href="#" class="nav-link"><i class="fas fa-server"></i> Server Management</a>
                <a href="{{ url_for('logout') }}" class="nav-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="header">
                <div>
                    <div class="header-title">Add New Question</div>
                    <p class="text-muted" style="margin-top: 0.25rem;">Adding to: {{ exam.exam_name }}</p>
                </div>
                <div class="user-profile">
                    <span style="font-weight: 500;">{{ session['name'] }}</span>
                    <div class="avatar" style="background-color: #8B5CF6;">{{ session['name'][0] }}</div>
                </div>
            </header>

            <div style="margin-top: 1rem;">
                <form method="POST" action="{{ url_for('add_question', exam_id=exam.id) }}" style="max-width: 800px;">
                    <div class="stat-card">
                        <div class="form-group">
                            <label class="form-label">Question Text</label>
                            <input class="form-input" type="text" name="question_text" required placeholder="Enter the question...">
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label class="form-label">Option 1</label>
                                <input class="form-input" type="text" name="option1" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Option 2</label>
                                <input class="form-input" type="text" name="option2" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Option 3</label>
                                <input class="form-input" type="text" name="option3" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Option 4</label>
                                <input class="form-input" type="text" name="option4" required>
                            </div>
                        </div>
                        <div class="form-group" style="margin-top: 0.5rem;">
                            <label class="form-label" style="color: var(--success);">Correct Answer (Exact Match Required)</label>
                            <input class="form-input" type="text" name="correct_answer" required placeholder="Paste the exact text of the correct option here">
                        </div>
                        <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
                            <button type="submit" class="btn-primary" style="width: auto;"><i class="fas fa-save"></i> Save Question</button>
                            <a href="{{ url_for('edit_exam', exam_id=exam.id) }}" class="btn-primary" style="background-color: var(--secondary); color: var(--text-main); border: 1px solid var(--border); text-decoration: none; width: auto; display: flex; align-items: center; justify-content: center;">Cancel</a>
                        </div>
                    </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
