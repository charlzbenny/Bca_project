<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Proctoring System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1 class="text-center mb-4" style="color: var(--primary); font-size: 1.75rem;">AI Exam System</h1>
            <p class="text-center text-muted mb-4">Please sign in to your account</p>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="alert alert-error">
                {% for message in messages %}
                {{ message }}
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-input" type="email" id="email" name="email" required placeholder="name@exam.com">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" name="password" required
                        placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
            <div class="text-center mt-4">
                <small class="text-muted" style="display:block; margin-top:1rem;">Test accounts: <br>admin@exam.com
                    (admin123) <br> student@exam.com (student123)</small>
            </div>
        </div>
    </div>
</body>

</html>
