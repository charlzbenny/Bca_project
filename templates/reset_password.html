<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - AI Proctoring System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1 class="text-center mb-4" style="color: var(--primary); font-size: 1.75rem;">Set New Password</h1>
            <p class="text-center text-muted mb-4">Please enter your new password below.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            {% if category == 'success' %}
            <div class="alert alert-success" style="margin-bottom: 1rem; border-radius: 4px; padding: 1rem; background: #D1FAE5; color: #065F46; border: 1px solid #34D399;">
            {% else %}
            <div class="alert alert-danger" style="margin-bottom: 1rem; border-radius: 4px; padding: 1rem; background: #FEE2E2; color: #B91C1C; border: 1px solid #FCA5A5;">
            {% endif %}
                {{ message|safe }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('reset_password', token=token) }}">
                <div class="form-group">
                    <label class="form-label" for="password">New Password</label>
                    <div style="position: relative;">
                        <input class="form-input" type="password" id="password" name="password" required
                            placeholder="••••••••" style="padding-right: 40px;">
                        <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted);"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary" style="margin-top: 1rem; width: 100%;">Update Password</button>
            </form>
        </div>
    </div>
    
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>

</html>
